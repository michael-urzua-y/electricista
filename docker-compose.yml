services:
  postgres:
    image: postgres:15-alpine
    container_name: monaysolutions_db
    environment:
      POSTGRES_DB: electricista
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - monaysolutions_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: monaysolutions_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - monaysolutions_net
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      args:
        INSTALL_DEV_DEPS: "true"
    container_name: monaysolutions_backend
    user: root
    command: >
      sh -c "sleep 5 &&
             python manage.py migrate &&
             python -m scripts.init_db &&
             python manage.py collectstatic --noinput &&
             gunicorn monaysolutions.wsgi:application --bind 0.0.0.0:8000 --timeout 120"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      DB_NAME: electricista
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY environment variable is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monaysolutions_net

  celery:
    build:
      context: .
      args:
        INSTALL_DEV_DEPS: "true"
    container_name: monaysolutions_celery
    user: root
    command: celery -A monaysolutions worker -l INFO
    volumes:
      - .:/app
      - media_volume:/app/media
    environment:
      DEBUG: "False"
      DB_NAME: electricista
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY environment variable is required}
    depends_on:
      - redis
      - postgres
    networks:
      - monaysolutions_net

  frontend:
    image: node:18-alpine
    container_name: monaysolutions_frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - monaysolutions_net

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  monaysolutions_net:
    driver: bridge
