name: monaysolutions-prod

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - monaysolutions_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:?DB_USER is required} -d ${DB_NAME:?DB_NAME is required}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - monaysolutions_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      args:
        INSTALL_DEV_DEPS: "false"
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn monaysolutions.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers ${GUNICORN_WORKERS:-3}"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monaysolutions_internal

  celery:
    build:
      context: .
      args:
        INSTALL_DEV_DEPS: "false"
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    command: celery -A monaysolutions worker -l INFO
    volumes:
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - monaysolutions_internal

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    volumes:
      - frontend_dist:/srv/frontend
    command: sh -c "rm -rf /srv/frontend/* && cp -a /dist/. /srv/frontend"
    networks:
      - monaysolutions_internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend_dist:/srv/frontend:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      frontend-build:
        condition: service_completed_successfully
    networks:
      - monaysolutions_internal

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  frontend_dist:
  caddy_data:
  caddy_config:

networks:
  monaysolutions_internal:
    driver: bridge
